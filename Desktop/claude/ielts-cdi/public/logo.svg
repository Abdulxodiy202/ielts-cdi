<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" fill="none">
  <!-- Background pill -->
  <rect width="200" height="52" rx="10" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="12" y="14" width="4" height="24" rx="2" fill="#6366f1"/>

  <!-- IELTS text -->
  <text x="26" y="33" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="1">IELTS</text>

  <!-- Pro badge -->
  <rect x="96" y="16" width="36" height="20" rx="4" fill="#6366f1"/>
  <text x="114" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">PRO</text>

  <!-- Decorative dots -->
  <circle cx="145" cy="20" r="2.5" fill="#6366f1" opacity="0.6"/>
  <circle cx="153" cy="26" r="2.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="145" cy="32" r="2.5" fill="#6366f1" opacity="0.4"/>
  <circle cx="161" cy="20" r="1.5" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="161" cy="32" r="1.5" fill="#a5b4fc" opacity="3"/>
</svg>
